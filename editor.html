<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Code Editor - DAA Virtual Lab</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .container {
            width: 90%;
            margin: 20px auto;
        }

        h2 {
            text-align: center;
        }

        #language {
            margin-bottom: 10px;
            padding: 5px;
            font-size: 14px;
        }

        #editor {
            width: 100%;
            height: 300px;
            font-family: monospace;
            font-size: 14px;
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 5px;
        }

        #output {
            width: 100%;
            height: 150px;
            font-family: monospace;
            font-size: 14px;
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            background: #f5f5f5;
            white-space: pre-wrap;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #007bff;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Code Editor</h2>

    <!-- Language selector -->
    <label for="language">Select Language: </label>
    <select id="language">
        <option value="java">Java</option>
        <option value="cpp">C++</option>
        <option value="python">Python</option>
    </select>

    <!-- Code editor -->
    <textarea id="editor" placeholder="Write your code here..."></textarea>
    <br>
    <button onclick="runCode()">Run Code</button>

    <h3>Output:</h3>
    <div id="output"></div>
</div>

<script src="api.js"></script>
<script src="editor.js"></script>
  
</body>
</html>
