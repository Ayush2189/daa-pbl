<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Submission History</title>

<link rel="stylesheet" href="style.css">

<style>

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
margin:0;
padding:0;
color:white;
}

.container{

width:95%;
max-width:1400px;
margin:30px auto;

background:white;

padding:25px;

border-radius:12px;

box-shadow:0 10px 30px rgba(0,0,0,0.2);

color:black;

}

h2{
text-align:center;
margin-bottom:20px;
}

.table-container{
overflow-x:auto;
margin-top:20px;
}

table{

min-width:1200px;
width:100%;
border-collapse:collapse;

}

th{

background:#4facfe;
color:white;
padding:12px;
position:sticky;
top:0;

}

td{

padding:10px;
border-bottom:1px solid #eee;

}

tr:hover{
background:#f2f7ff;
}

.status{

padding:5px 12px;
border-radius:20px;
font-size:13px;
font-weight:bold;

}

.passed{
background:#d4edda;
color:#155724;
}

.failed{
background:#f8d7da;
color:#721c24;
}

button{

background:#4facfe;
border:none;
padding:6px 14px;
color:white;
border-radius:6px;
cursor:pointer;
font-weight:500;

}

button:hover{
background:#2f80ed;
}

.view-btn{

background:#27ae60;

}

.view-btn:hover{

background:#1e8449;

}

.filter{

margin-bottom:15px;

}

select{

padding:6px;
border-radius:5px;

}

.modal{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.7);

}

.modal-content{

background:white;

width:65%;

margin:4% auto;

padding:20px;

border-radius:10px;

color:black;

animation:fadeIn .3s;

}

@keyframes fadeIn{

from{opacity:0;transform:scale(.9)}
to{opacity:1;transform:scale(1)}

}

pre{

background:#1e1e1e;

color:#00ff9c;

padding:15px;

border-radius:8px;

overflow:auto;

max-height:450px;

}

.close{

float:right;

font-size:24px;

cursor:pointer;

font-weight:bold;

}

.copy{

float:right;
margin-right:15px;
background:#34495e;

}

.copy:hover{

background:#2c3e50;

}

</style>

</head>

<body>

<div class="container">

<h2>Submission History</h2>

<div class="filter">

Filter:

<select id="statusFilter" onchange="loadHistory()">

<option value="all">All</option>

<option value="Passed">Passed</option>

<option value="Failed">Failed</option>

</select>

</div>

<div class="table-container">

<table>

<thead>

<tr>

<th>Assignment</th>
<th>Status</th>
<th>Score</th>
<th>Time</th>
<th>Attempts</th>
<th>Output</th>
<th>Date</th>
<th>Code</th>

</tr>

</thead>

<tbody id="historyList">

<tr>
<td colspan="8">Loading...</td>
</tr>

</tbody>

</table>

</div>

</div>

<!-- CODE MODAL -->

<div id="codeModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeModal()">&times;</span>

<button class="copy" onclick="copyCode()">Copy</button>

<h3>Submitted Code</h3>

<pre id="codeContent"></pre>

</div>

</div>

<!-- OUTPUT MODAL -->

<div id="outputModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeOutput()">&times;</span>

<h3>Program Output</h3>

<pre id="outputContent"></pre>

</div>

</div>

<script src="history.js"></script>

</body>

</html>
