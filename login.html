<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAA Virtual Lab - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

   <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Animated Background -->
<div class="bg-canvas">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>
<div class="bg-grid"></div>

<div class="page-wrapper">

    <!-- Brand -->
    <div class="brand">
        <div class="brand-logo">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
        </div>
        <div class="brand-name">DAA Virtual Lab</div>
        <div class="brand-sub">Design & Analysis of Algorithms</div>
    </div>

    <!-- Card -->
    <div class="container">

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" onclick="selectTab('student')">Student</div>
            <div class="tab" onclick="selectTab('admin')">Admin</div>
        </div>

        <div id="studentForm">
            <div class="form-title">Welcome back 👋</div>
            <div class="form-subtitle">Sign in to access your lab workspace</div>

            <div class="field-group">

                <!-- Username -->
                <div class="field">
                    <label class="field-label" for="username">Username</label>
                    <div class="input-wrap">
                        <span class="input-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </span>
                        <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username">
                    </div>
                    <div class="field-msg" id="usernameMsg"></div>
                </div>

                <!-- Password -->
                <div class="field">
                    <label class="field-label" for="password">Password</label>
                    <div class="input-wrap">
                        <span class="input-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                        </span>
                        <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password">
                        <button class="toggle-password" type="button" id="togglePass" aria-label="Toggle password visibility">
                            <!-- Eye open -->
                            <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <!-- Eye closed -->
                            <svg class="eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                    <div class="field-msg" id="passwordMsg"></div>
                </div>

            </div>

            <!-- Remember me + forgot -->
            <div class="row-extras">
                <label class="remember-label">
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    Remember me
                </label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <!-- Login Button -->
            <button id="loginBtn" type="button">
                <span class="btn-text">Sign In</span>
                <span class="btn-loader"><span class="spinner"></span></span>
            </button>

            <!-- Global message -->
            <div id="globalMsg"></div>
        </div>

        <div class="card-footer">
            Need help? <a href="#" style="color: var(--accent); opacity: 0.85;">Contact support</a>
        </div>

    </div>
</div>

<script>
    /* ── Tab switching ────────────────────────────────────── */
    function selectTab(type) {
        const tabs = document.querySelectorAll(".tab");
        tabs.forEach(tab => tab.classList.remove("active"));

        if (type === "student") {
            tabs[0].classList.add("active");
        } else {
            tabs[1].classList.add("active");
        }
    }

    /* ── Show / Hide Password ─────────────────────────────── */
    const togglePass = document.getElementById("togglePass");
    const passwordInput = document.getElementById("password");

    togglePass.addEventListener("click", () => {
        const isHidden = passwordInput.type === "password";
        passwordInput.type = isHidden ? "text" : "password";
        togglePass.classList.toggle("show-pass", isHidden);
    });

    /* ── Inline validation helpers ───────────────────────── */
    function setMsg(id, text, type) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = "field-msg visible " + type;
    }

    function clearMsg(id) {
        const el = document.getElementById(id);
        el.textContent = "";
        el.className = "field-msg";
    }

    function setFieldError(inputId, msgId, msg) {
        document.getElementById(inputId).classList.add("error-field");
        setMsg(msgId, msg, "error");
    }

    function clearFieldError(inputId, msgId) {
        document.getElementById(inputId).classList.remove("error-field");
        clearMsg(msgId);
    }

    /* Clear errors on input */
    document.getElementById("username").addEventListener("input", () => clearFieldError("username", "usernameMsg"));
    document.getElementById("password").addEventListener("input", () => clearFieldError("password", "passwordMsg"));

    /* ── Global message ──────────────────────────────────── */
    function showGlobal(text, type) {
    const el = document.getElementById("globalMsg");
    el.textContent = text;
    el.className = "";
    el.classList.add(type);
 }

    function hideGlobal() {
        const el = document.getElementById("globalMsg");
        el.className = "";
        el.textContent = "";
    }

    /* ── Remember Me – pre-fill ──────────────────────────── */
    window.addEventListener("DOMContentLoaded", () => {
        const saved = localStorage.getItem("daa_remember");
        if (saved) {
            try {
                const { username } = JSON.parse(saved);
                document.getElementById("username").value = username;
                document.getElementById("rememberMe").checked = true;
            } catch(e) {}
        }
    });

    
          
   
</script>
<script src="login.js"></script>

</body>
</html>
